    <link rel="stylesheet" href="assets/css/site.css">
    <style>
    .hero-section {
        background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)),
                          url('assets/images/hero-bg.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }
    </style>
    <script src="assets/js/site.js"></script>
</head>

<body class="home-page">

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- ═══ HERO ═══ -->
    <section class="hero-section" id="top">
        <div class="hero-dots"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>

        <div class="relative z-10 w-full max-w-3xl mx-auto px-6 text-center py-14">

            <!-- Profile photo with spinning gradient ring + 3D coin flip -->
            <div class="profile-wrap fade-up d1" style="margin-bottom: 40px;">
                <div class="ring-spinner"></div>
                <div class="ring-gap"></div>

                <div class="profile-flip">
                    <div class="profile-flip-inner">
                        <!-- Front face -->
                        <div class="profile-face profile-front">
                            <img src="assets/images/profile.jpg" alt="Debjyoti Saha Roy">
                        </div>
                        <!-- Back face -->
                        <div class="profile-face profile-back">
                            <img src="assets/images/profile-alt.jpeg" alt="Debjyoti Saha Roy">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Affiliation tags -->
            <div class="flex items-center justify-center flex-wrap gap-2 mb-7 fade-up d2">
                <a href="https://www.khoury.northeastern.edu" target="_blank" class="affil-tag">
                    <span class="affil-dot"></span>PhD Candidate
                </a>
                <span class="affil-sep">·</span>
                <a href="https://www.khoury.northeastern.edu" target="_blank" class="affil-tag">
                    <span class="affil-dot"></span>Khoury College of CS
                </a>
                <span class="affil-sep">·</span>
                <a href="https://www.northeastern.edu" target="_blank" class="affil-tag">
                    <span class="affil-dot"></span>Northeastern University
                </a>
            </div>

            <!-- Name -->
            <h1 class="hero-name mb-5 fade-up d3">Debjyoti Saha Roy</h1>

            <!-- Tagline -->
            <div class="tagline-box mb-10">
                <p class="hero-tagline hero-blur-in" style="margin: 0; animation-delay: 0.65s;">
                    Better attention. Deeper reasoning. Massive label spaces — understood mechanistically.
                </p>
            </div>

            <!-- CTA Buttons -->
            <div class="flex items-center justify-center gap-4 mb-10 flex-wrap fade-up d5">
                <a href="research.html" class="btn-solid">Explore Research</a>
                <a href="#" class="btn-ghost">Download CV</a>
            </div>

            <!-- Social Links -->
            <div class="flex items-center justify-center gap-3 fade-up d6">
                <a href="https://github.com/yourusername"                   target="_blank" class="social-icon hover:text-blue-400 hero-icon-pop d6" title="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://scholar.google.com/citations?user=YOUR-ID" target="_blank" class="social-icon hover:text-blue-400 hero-icon-pop d7" title="Google Scholar"><i class="fas fa-graduation-cap"></i></a>
                <a href="https://linkedin.com/in/yourprofile"               target="_blank" class="social-icon hover:text-blue-400 hero-icon-pop d8" title="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="https://x.com/debjyotisaharoy"                    target="_blank" class="social-icon hover:text-blue-400 hero-icon-pop d9" title="X / Twitter"><i class="fab fa-x-twitter"></i></a>
                <a href="https://bsky.app/profile/yourhandle"               target="_blank" class="social-icon hover:text-blue-400 hero-icon-pop d10" title="Bluesky"><i class="fab fa-bluesky"></i></a>
                <a href="https://instagram.com/yourusername"                target="_blank" class="social-icon hover:text-blue-400 hero-icon-pop d11" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://facebook.com/yourusername"   target="_blank" class="social-icon hover:text-blue-400 hero-icon-pop d12" title="Facebook"><i class="fab fa-facebook"></i></a>
            </div>
        </div>

        <!-- Scroll hint -->
        <a href="#publications" class="scroll-hint">
            <div class="scroll-hint-line"></div>
            <span class="scroll-hint-text">Scroll</span>
        </a>
    </section>

    <!-- Gradient seam -->
    <div class="hero-seam"></div>

    <!-- ═══ RECENT PUBLICATIONS ═══ -->
    <section class="pubs-section" id="publications">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex items-end justify-between mb-1">
                <div>
                    <p class="section-eyebrow">Research</p>
                    <h2 class="section-title">Recent Publications</h2>
                </div>
                <a href="research.html" class="view-all-link mb-1">View all →</a>
            </div>
            <hr class="section-header-rule mb-10">

            <div id="recent-publications-container" class="space-y-8">
                <div class="text-center py-12 text-zinc-400 text-sm">Loading publications…</div>
            </div>
        </div>
    </section>

    <script src="assets/js/main.js"></script>

    <!-- Footer -->
    <div id="footer"></div>

    <script>
        fetch('components/navbar.html')
            .then(r => r.text())
            .then(d => { document.getElementById('navbar').innerHTML = d; })
            .catch(e => console.error('Navbar error:', e));

        fetch('components/footer.html')
            .then(r => r.text())
            .then(d => {
                document.getElementById('footer').innerHTML = d;
                // Run after footer is injected into the DOM
                initEmailCanvas();
            })
            .catch(e => console.error('Footer error:', e));
    </script>

    <!-- Modals -->
    <div id="modals-container"></div>
    <script src="assets/js/modals.js"></script>
    <script src="assets/js/publications.js"></script>
    <script>
        fetch('components/modals.html')
            .then(r => r.text())
            .then(html => { document.getElementById('modals-container').innerHTML = html; });

        loadPublications('recent-publications-container', RECENT_COUNT);
    </script>

    <script>
    // Remove pop animation classes once they've all finished
    // (last icon: d11 = 1.14s delay + 0.5s duration = 1.65s total)
    setTimeout(() => {
        document.querySelectorAll('.hero-icon-pop').forEach(el => {
            el.classList.remove('hero-icon-pop');
            ['d6','d7','d8','d9','d10','d11'].forEach(c => el.classList.remove(c));
        });
    }, 1700);
    </script>

</body>
</html>
