<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debjyoti Saharoy | Academic Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-blue: #4a8fe8;
            --accent-violet: #7c6ff7;
            --hero-bg: #06070d;
            --body-bg: #f4f3ef;
            --text-dark: #0d1117;
        }

        * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--body-bg);
            color: var(--text-dark);
            margin: 0;
        }

        /* ─── HERO ─── */
        .hero-section {
            background: var(--hero-bg);
            position: relative;
            overflow: hidden;
            min-height: 62vh;
            display: flex;
            align-items: center;
        }

        /* Dot grid texture */
        .hero-dots {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1px);
            background-size: 28px 28px;
            z-index: 0;
        }

        /* Ambient glow orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            will-change: transform;
        }
        .orb-1 {
            width: 640px; height: 640px;
            background: radial-gradient(circle at center, rgba(74,143,232,0.13) 0%, transparent 65%);
            top: -240px; right: -60px;
            animation: drift 14s ease-in-out infinite;
        }
        .orb-2 {
            width: 420px; height: 420px;
            background: radial-gradient(circle at center, rgba(124,111,247,0.11) 0%, transparent 65%);
            bottom: -120px; left: 40px;
            animation: drift 18s ease-in-out infinite reverse;
            animation-delay: -6s;
        }
        .orb-3 {
            width: 280px; height: 280px;
            background: radial-gradient(circle at center, rgba(16,185,129,0.08) 0%, transparent 65%);
            top: 35%; right: 18%;
            animation: drift 22s ease-in-out infinite;
            animation-delay: -10s;
        }

        @keyframes drift {
            0%,100% { transform: translate(0, 0); }
            30%      { transform: translate(24px, -18px); }
            65%      { transform: translate(-16px, 12px); }
        }

        /* ─── PROFILE RING ─── */
        .profile-wrap {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 28px;
            flex-shrink: 0;
        }
        .ring-spinner {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #4a8fe8 0%, #7c6ff7 35%, #38bdf8 60%, #4a8fe8 100%);
            animation: spin-ring 5s linear infinite;
        }
        .ring-gap {
            position: absolute;
            inset: 2px;
            border-radius: 50%;
            background: var(--hero-bg);
        }
        .profile-photo {
            position: absolute;
            top: 7px;
            left: 7px;
            width: calc(100% - 14px);
            height: calc(100% - 14px);
            border-radius: 50%;
            object-fit: cover;
            object-position: 50% 20%;
            z-index: 1;
            display: block;
        }
        @keyframes spin-ring { to { transform: rotate(360deg); } }

        /* ─── HERO TYPOGRAPHY ─── */
        .hero-name {
            font-family: 'Fraunces', serif;
            font-size: clamp(2.6rem, 5.5vw, 4.8rem);
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.03em;
            line-height: 1.05;
        }

        /* ─── AFFILIATION TAGS ─── */
        .affil-tag {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            color: rgba(255,255,255,0.65);
            padding: 7px 16px;
            border-radius: 100px;
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 0.015em;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .affil-tag:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.18);
            color: #fff;
        }
        .affil-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent-blue);
            flex-shrink: 0;
        }
        .affil-sep {
            color: rgba(255,255,255,0.2);
            font-size: 1.1rem;
            user-select: none;
        }

        /* ─── HERO TAGLINE ─── */
        .hero-tagline {
            color: rgba(255,255,255,0.42);
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.65;
            max-width: 480px;
            font-style: italic;
        }

        /* ─── HERO BUTTONS ─── */
        .btn-solid {
            background: var(--accent-blue);
            color: #fff;
            padding: 13px 30px;
            border-radius: 100px;
            font-weight: 500;
            font-size: 0.9rem;
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }
        .btn-solid:hover {
            background: #3a7cd4;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(74,143,232,0.3);
        }

        .btn-ghost {
            border: 1px solid rgba(255,255,255,0.16);
            color: rgba(255,255,255,0.78);
            padding: 13px 30px;
            border-radius: 100px;
            font-weight: 400;
            font-size: 0.9rem;
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: background 0.2s, border-color 0.2s, transform 0.2s;
            display: inline-block;
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.28);
            transform: translateY(-2px);
        }

        /* ─── SOCIAL ICONS ─── */
        .social-icon {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.42);
            font-size: 0.95rem;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
        }
        .social-icon:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.25);
            color: #fff;
            transform: translateY(-3px);
        }

        /* ─── SCROLL INDICATOR ─── */
        .scroll-hint {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }
        .scroll-hint-text {
            font-size: 0.62rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
        }
        .scroll-hint-line {
            width: 1px;
            height: 36px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
            animation: line-pulse 2.2s ease-in-out infinite;
        }
        @keyframes line-pulse {
            0%,100% { opacity: 0.3; }
            50%      { opacity: 0.9; }
        }

        /* ─── SEAM ─── */
        .hero-seam {
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, rgba(74,143,232,0.35) 40%, rgba(124,111,247,0.35) 60%, transparent 100%);
        }

        /* ─── PUBLICATIONS SECTION ─── */
        .pubs-section {
            background: var(--body-bg);
            padding: 80px 0 96px;
        }

        .section-eyebrow {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-blue);
            margin-bottom: 6px;
        }
        .section-title {
            font-family: 'Fraunces', serif;
            font-size: 2.1rem;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.025em;
            line-height: 1.1;
        }
        .section-header-rule {
            border: none;
            border-top: 1px solid rgba(0,0,0,0.08);
            margin-top: 20px;
        }
        .view-all-link {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--accent-blue);
            text-decoration: none;
            letter-spacing: 0.01em;
            transition: opacity 0.2s;
        }
        .view-all-link:hover { opacity: 0.7; }

        /* ─── STAGGERED FADE IN ─── */
        .fade-up {
            opacity: 0;
            transform: translateY(22px);
            animation: fade-up-kf 0.65s cubic-bezier(0.22,1,0.36,1) forwards;
        }
        @keyframes fade-up-kf {
            to { opacity: 1; transform: translateY(0); }
        }
        .d1 { animation-delay: 0.05s; }
        .d2 { animation-delay: 0.18s; }
        .d3 { animation-delay: 0.31s; }
        .d4 { animation-delay: 0.44s; }
        .d5 { animation-delay: 0.57s; }
        .d6 { animation-delay: 0.7s; }

        /* ─── LEGACY COMPAT ─── */
        .nav-link { transition: color 0.2s; }
        .nav-link:hover { color: #3b82f6; }
        .nav-home { color: #3b82f6; font-weight: 600; }
    </style>
</head>

<body class="home-page">

</html>
