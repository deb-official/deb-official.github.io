<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debjyoti Saharoy | Academic Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <style>
        .hero-bg {
            background-image: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.75)), url('assets/images/hero-bg.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            /* Nice parallax effect */
        }

        .nav-link {
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #3b82f6;
            transform: translateY(-2px);
        }

        /* Active link styling */
        .nav-home {
            color: #3b82f6;
            font-weight: 600;
        }
    </style>
</head>

<body class="font-['Inter'] bg-zinc-50 text-zinc-800 home-page">

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Hero Section -->
    <section class="hero-bg h-screen flex items-center text-white">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <img src="assets/images/profile.jpg" alt="Debjyoti Saha Roy"
                class="w-48 h-48 rounded-full mx-auto mb-8 border-4 border-white shadow-2xl object-cover object-[50%_20%]">
            <h1 class="text-6xl font-bold mb-4 tracking-tighter">Debjyoti Saha Roy</h1>
            <p class="text-2xl mb-6 text-zinc-200 whitespace-nowrap">
                PhD Candidate •
                <a href="https://www.khoury.northeastern.edu" target="_blank"
                    class="hover:text-white hover:underline transition-colors">
                    Khoury College of Computer Sciences
                </a> •
                <a href="https://www.northeastern.edu" target="_blank"
                    class="hover:text-white hover:underline transition-colors">
                    Northeastern University
                </a>
            </p>
            <p class="text-xl max-w-2xl mx-auto text-zinc-300 mb-10">
                Advancing [Your Research Field] through innovative methodologies and interdisciplinary approaches.
            </p>
            <!-- Main Action Buttons -->
            <div class="flex gap-4 justify-center mb-12">
                <a href="#" class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-full font-medium text-lg transition">
                    Explore Research
                </a>
                <a href="#"
                    class="border border-white hover:bg-white hover:text-zinc-900 px-8 py-4 rounded-full font-medium text-lg transition">
                    Download CV
                </a>
            </div>
            <!-- Social & Academic Links -->
            <div class="flex justify-center gap-6 text-3xl">
                <a href="https://github.com/yourusername" target="_blank" class="hover:text-blue-400 transition"><i
                        class="fab fa-github"></i></a>
                <a href="https://scholar.google.com/citations?user=YOUR-ID" target="_blank"
                    class="hover:text-blue-400 transition"><i class="fas fa-graduation-cap"></i></a>
                <a href="https://linkedin.com/in/yourprofile" target="_blank" class="hover:text-blue-400 transition"><i
                        class="fab fa-linkedin"></i></a>
                <a href="https://x.com/debjyotisaharoy" target="_blank" class="hover:text-blue-400 transition"><i
                        class="fab fa-x-twitter"></i></a>
                <a href="https://bsky.app/profile/yourhandle" target="_blank" class="hover:text-blue-400 transition"><i
                        class="fab fa-bluesky"></i></a>
                <a href="https://instagram.com/yourusername" target="_blank" class="hover:text-blue-400 transition"><i
                        class="fab fa-instagram"></i></a>
            </div>
        </div>
    </section>

    <!-- Recent Publications Section -->
    <section class="max-w-6xl mx-auto px-6 py-16">
        <div class="flex items-baseline justify-between mb-8 border-b pb-4">
            <h2 class="text-3xl font-semibold">Recent Publications</h2>
            <a href="research.html" class="text-blue-600 hover:underline text-sm font-medium">
                View all →
            </a>
        </div>
        <div id="recent-publications-container" class="space-y-8">
            <div class="text-center py-12 text-zinc-400">Loading publications...</div>
        </div>
    </section>

    <script src="assets/js/main.js"></script>

    <!-- Footer -->
    <div id="footer"></div>

    <script>
        // Load Navbar
        fetch('components/navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;
            })
            .catch(err => console.error('Navbar load error:', err));

        // Load Footer
        fetch('components/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer').innerHTML = data;
            });
    </script>

    <!-- Modals Container -->
    <div id="modals-container"></div>

    <script src="assets/js/modals.js"></script>
    <script src="assets/js/publications.js"></script>
    <script>
        fetch('components/modals.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('modals-container').innerHTML = html;
            });

        loadPublications('recent-publications-container', RECENT_COUNT);
    </script>

</body>

</html>
