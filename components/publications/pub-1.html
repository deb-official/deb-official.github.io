            <span class="text-xs font-medium bg-amber-50 text-amber-800 border border-amber-200

        <a href="https://www.ccs.neu.edu/home/jaa/" target="_blank"

    <!-- Row 4: abstract preview -->
    <p class="text-[13px] text-zinc-500 leading-relaxed line-clamp-2">
