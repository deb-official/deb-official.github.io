<style>
    #abstractText.typing::after {
        content: '';
        display: inline-block;
        width: 3px;
        height: 1em;
        background: #1D9E75;
        vertical-align: -0.15em;
        margin-left: 2px;
        border-radius: 1px;
        animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0;
        }
    }
</style>

<!-- Abstract Modal -->
<div id="abstractModal"
    class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl flex items-center justify-center z-50 transition-opacity duration-300">
    <div class="bg-white max-w-2xl w-full mx-4 rounded-3xl 
        shadow-[0_0_80px_-10px_rgb(59,130,246,0.4),0_30px_70px_-20px_rgb(0,0,0,0.25)]
        hover:shadow-[0_0_135px_15px_rgb(59,130,246,0.65),0_40px_90px_-20px_rgb(0,0,0,0.35)]
        hover:ring-4 hover:ring-blue-400/30
        overflow-hidden border border-white/60
        transition-all duration-300 ease-out">
        <div
            class="px-8 py-6 border-b border-zinc-100 flex items-center justify-between bg-gradient-to-r from-zinc-50 to-white">
            <h2 class="text-2xl font-semibold text-zinc-900 flex items-center gap-3">📝 Abstract</h2>
            <button onclick="closeAbstractModal()"
                class="w-10 h-10 flex items-center justify-center text-3xl text-zinc-400 hover:text-zinc-600 hover:rotate-90 transition-all duration-300">×</button>
        </div>
        <div class="p-9 max-h-[68vh] overflow-y-auto text-zinc-700 leading-relaxed text-[15.8px]">
            <p id="abstractText" class="whitespace-pre-line break-words"></p>
        </div>
        <div class="px-8 py-6 bg-zinc-50 border-t border-zinc-100 flex justify-end">
            <button onclick="closeAbstractModal()"
                class="px-8 py-3 bg-white border border-zinc-300 text-zinc-700 hover:bg-zinc-900 hover:text-white hover:border-zinc-900 rounded-2xl font-medium transition-all active:scale-95">Close</button>
        </div>
    </div>
</div>

<!-- Citation Modal -->
<div id="citationModal"
    class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl flex items-center justify-center z-50 transition-opacity duration-300">
    <div class="bg-white max-w-lg w-full mx-4 rounded-3xl shadow-[0_0_80px_-10px_rgb(59,130,246,0.4),0_30px_70px_-20px_rgb(0,0,0,0.25)] 
            overflow-hidden border border-white/60 transition-all duration-500">
        <div
            class="px-8 py-6 border-b border-zinc-100 flex items-center justify-between bg-gradient-to-r from-zinc-50 to-white">
            <h2 class="text-2xl font-semibold text-zinc-900">
                <i class="fa-solid fa-quote-left text-zinc-500"></i> Citation
            </h2>
            <button onclick="closeCitationModal()"
                class="w-10 h-10 flex items-center justify-center text-3xl text-zinc-400 hover:text-zinc-600 hover:rotate-90 transition-all">×</button>
        </div>
        <div class="p-8">
            <div id="citationText"
                class="bg-zinc-50 border border-zinc-200 rounded-2xl p-5 font-mono text-sm text-zinc-800 overflow-x-auto whitespace-pre leading-relaxed overflow-y-auto max-h-[60vh]">
            </div>
        </div>
        <div class="px-8 py-6 bg-zinc-50 border-t border-zinc-100 flex justify-end gap-3">
            <button onclick="copyCitation()"
                class="px-6 py-3 bg-blue-400 hover:bg-blue-700 text-white rounded-2xl font-medium transition-all active:scale-95">
                <i class="fa-solid fa-copy"></i> Copy BibTeX
            </button>
            <button onclick="closeCitationModal()"
                class="px-6 py-3 bg-white border border-zinc-300 text-zinc-700 hover:bg-zinc-900 hover:text-white hover:border-zinc-900 rounded-2xl font-medium transition-all">Close</button>
        </div>
    </div>
</div>

<!-- Diagram Modal -->
<div id="diagramModal"
    class="hidden fixed inset-0 bg-black/80 backdrop-blur-2xl flex items-center justify-center z-50 transition-opacity duration-300">
    <div class="bg-white w-full max-w-7xl mx-4 rounded-3xl shadow-[0_0_100px_-10px_rgb(59,130,246,0.5),0_40px_90px_-20px_rgb(0,0,0,0.35)]
        hover:shadow-[0_0_150px_20px_rgb(59,130,246,0.75),0_50px_120px_-20px_rgb(0,0,0,0.45)]
        hover:ring-4 hover:ring-blue-500/40
        overflow-hidden border border-white/60 transition-all duration-500 max-h-[92vh] flex flex-col">
        <div
            class="px-8 py-5 border-b border-zinc-100 flex items-center justify-between bg-gradient-to-r from-zinc-50 to-white shrink-0">
            <h2 id="diagramTitle" class="text-2xl font-semibold text-zinc-900 flex items-center gap-3">
                <i class="fa-solid fa-diagram-project text-blue-500"></i> Diagram
            </h2>
            <div class="flex items-center gap-4">
                <span id="diagramCounter" class="text-sm text-zinc-400 font-medium hidden"></span>
                <button onclick="closeDiagramModal()"
                    class="w-10 h-10 flex items-center justify-center text-3xl text-zinc-400 hover:text-zinc-600 hover:rotate-90 transition-all duration-300">×</button>
            </div>
        </div>
        <div class="p-6 bg-zinc-50 flex flex-col items-center overflow-auto relative">
            <div
                class="w-full flex items-center justify-center bg-white rounded-2xl p-4 shadow-inner border border-zinc-100 relative">
                <button id="diagramPrev" onclick="stepDiagram(-1)" class="hidden absolute left-3 top-1/2 -translate-y-1/2 z-10
                       w-10 h-10 flex items-center justify-center
                       bg-white border border-zinc-200 rounded-full shadow
                       text-zinc-500 hover:text-zinc-900 hover:border-zinc-400
                       transition-all active:scale-95">‹</button>
                <iframe id="diagramImage" src="" class="w-full h-full rounded-xl border-0 transition-all"
                    style="height: clamp(300px, 30vh, 800px);" title="Paper Diagram"></iframe>
                <button id="diagramNext" onclick="stepDiagram(1)" class="hidden absolute right-3 top-1/2 -translate-y-1/2 z-10
                       w-10 h-10 flex items-center justify-center
                       bg-white border border-zinc-200 rounded-full shadow
                       text-zinc-500 hover:text-zinc-900 hover:border-zinc-400
                       transition-all active:scale-95">›</button>
            </div>
            <div id="diagramCaption"
                class="mt-4 text-center max-w-4xl text-zinc-600 text-[19.2px] leading-relaxed px-4 shrink-0"></div>
        </div>
        <div class="px-8 py-4 bg-zinc-50 border-t border-zinc-100 flex justify-end shrink-0">
            <button onclick="closeDiagramModal()"
                class="px-8 py-3 bg-white border border-zinc-300 text-zinc-700 hover:bg-zinc-900 hover:text-white hover:border-zinc-900 rounded-2xl font-medium transition-all active:scale-95">Close</button>
        </div>
    </div>
</div>
