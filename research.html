<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research | Debjyoti Saharoy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"> -->
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/site.css">
</head>

<body class="research-page">

    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- ═══ PAGE HEADER ═══ -->
    <header class="page-header">
        <div class="hero-dots"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="page-header-content fade-up d1">
            <p class="page-header-eyebrow">Work</p>
            <h1 class="page-header-title">Research</h1>
            <p class="page-header-sub">
                My research lies at the intersection of Natural Language Processing,
                Large Language Models, and efficient AI systems.
            </p>

            <!-- Research area chips -->
            <div class="chip-row fade-up d2">
                <span class="chip">Natural Language Processing</span>
                <span class="chip">Large Language Models</span>
                <span class="chip">Efficient AI Systems</span>
                <span class="chip">Model Optimization</span>
            </div>
        </div>
    </header>

    <!-- Gradient seam -->
    <div class="hero-seam"></div>

    <!-- ═══ PUBLICATIONS ═══ -->
    <section class="page-section">
        <div class="max-w-6xl mx-auto px-6">

            <div class="flex items-end justify-between mb-1">
                <div>
                    <p class="section-eyebrow">Publications & Preprints</p>
                    <h2 class="section-title">Selected Work</h2>
                </div>
            </div>
            <hr class="section-header-rule mb-10">

            <div id="publications-container" class="space-y-8">
                <div class="text-center py-12 text-zinc-400 text-sm">Loading publications…</div>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <div id="footer"></div>

    <!-- Modals -->
    <div id="modals-container"></div>
    <script src="assets/js/modals.js"></script>

    <script>
        fetch('components/modals.html')
            .then(r => r.text())
            .then(html => { document.getElementById('modals-container').innerHTML = html; });

        fetch('components/navbar.html')
            .then(r => r.text())
            .then(d => { document.getElementById('navbar').innerHTML = d; })
            .catch(e => console.error('Navbar error:', e));

        fetch('components/footer.html')
            .then(r => r.text())
            .then(d => { document.getElementById('footer').innerHTML = d; })
            .catch(e => console.error('Footer error:', e));
    </script>

    <script src="assets/js/publications.js"></script>
    <script>
        loadPublications('publications-container');
    </script>

</body>

</html>
