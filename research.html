<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research | Debjyoti Saharoy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <style>
        .nav-link {
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #3b82f6;
            transform: translateY(-2px);
        }

        /* Active link styling */
        .nav-research {
            color: #3b82f6;
            font-weight: 600;
        }
    </style>
</head>

<body class="font-['Inter'] bg-zinc-50 text-zinc-800 research-page">

    <!-- Navbar will be loaded here -->
    <div id="navbar"></div>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-16">
        <h1 class="text-5xl font-bold tracking-tight mb-4">Research</h1>
        <p class="text-xl text-zinc-600 max-w-3xl mb-5">
            My research lies at the intersection of Natural Language Processing, Large Language Models, and efficient AI
            systems.
        </p>

        <!-- Research Keywords -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <!-- Box 1 -->
            <div class="bg-white border border-zinc-200 rounded-xl p-4 hover:border-zinc-400 transition-colors">
                <div class="text-base font-semibold text-zinc-900">Natural Language Processing</div>
            </div>

            <!-- Box 2 -->
            <div class="bg-white border border-zinc-200 rounded-xl p-4 hover:border-zinc-400 transition-colors">
                <div class="text-base font-semibold text-zinc-900">Large Language Models</div>
            </div>

            <!-- Box 3 -->
            <div class="bg-white border border-zinc-200 rounded-xl p-4 hover:border-zinc-400 transition-colors">
                <div class="text-base font-semibold text-zinc-900">Efficient AI Systems</div>
            </div>

            <!-- Box 4 -->
            <div class="bg-white border border-zinc-200 rounded-xl p-4 hover:border-zinc-400 transition-colors">
                <div class="text-base font-semibold text-zinc-900">Model Optimization</div>
            </div>
        </div>

        <!-- Publications & Preprints -->
        <section class="mt-12">
            <h2 class="text-3xl font-semibold mb-8 border-b pb-4">Selected Publications & Preprints</h2>

            <div id="publications-container" class="space-y-8">
                <!-- Publications will be loaded here dynamically -->
                <div class="text-center py-12 text-zinc-400">
                    Loading publications...
                </div>
            </div>
        </section>
    </main>

    <!-- Footer will be loaded here -->
    <div id="footer"></div>

    <script>
        // Load Navbar
        fetch('components/navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;
            })
            .catch(err => console.error('Navbar load error:', err));

        // Load Footer
        fetch('components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data)
            .catch(err => console.error('Footer load error:', err));

        // Load Publications
        const publications = [
            'components/publications/pub-1.html',
            // 'components/publications/pub-2.html',
            // 'components/publications/pub-3.html'
            // Add more files here as you create them
        ];

        const container = document.getElementById('publications-container');
        container.innerHTML = ''; // Clear loading message

        publications.forEach(file => {
            fetch(file)
                .then(response => response.text())
                .then(html => {
                    container.innerHTML += html;
                })
                .catch(err => console.error('Error loading', file, err));
        });

        // Abstract Modal Functions
        function showAbstractModal() {
            const modal = document.getElementById('abstractModal');
            modal.classList.remove('hidden');
            modal.style.opacity = '0';

            // Trigger smooth fade-in
            setTimeout(() => {
                modal.style.transition = 'opacity 300ms ease-out';
                modal.style.opacity = '1';
            }, 10);
        }

        function closeAbstractModal() {
            const modal = document.getElementById('abstractModal');
            modal.style.opacity = '0';

            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Close when clicking backdrop
        document.getElementById('abstractModal').addEventListener('click', function (e) {
            if (e.target === this) closeAbstractModal();
        });
    </script>
</body>

</html>
