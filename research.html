<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research | Debjyoti Saharoy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <style>
        .nav-link {
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: #3b82f6;
            transform: translateY(-2px);
        }

        /* Active link styling */
        .nav-research {
            color: #3b82f6;
            font-weight: 600;
        }

        #abstractText.typing::after {
            content: '';
            display: inline-block;
            width: 3px;
            height: 1em;
            background: #1D9E75;
            vertical-align: -0.15em;
            margin-left: 2px;
            border-radius: 1px;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body class="font-['Inter'] bg-zinc-50 text-zinc-800 research-page">

    <!-- Navbar will be loaded here -->
    <div id="navbar"></div>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-16">
        <h1 class="text-5xl font-bold tracking-tight mb-4">Research</h1>
        <p class="text-xl text-zinc-600 max-w-3xl mb-5">
            My research lies at the intersection of Natural Language Processing, Large Language Models, and efficient AI
            systems.
        </p>

        <!-- Research Keywords -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <!-- Box 1 -->
            <div class="bg-white border border-zinc-200 rounded-xl p-4 hover:border-zinc-400 transition-colors">
                <div class="text-base font-semibold text-zinc-900">Natural Language Processing</div>
            </div>

            <!-- Box 2 -->
            <div class="bg-white border border-zinc-200 rounded-xl p-4 hover:border-zinc-400 transition-colors">
                <div class="text-base font-semibold text-zinc-900">Large Language Models</div>
            </div>

            <!-- Box 3 -->
            <div class="bg-white border border-zinc-200 rounded-xl p-4 hover:border-zinc-400 transition-colors">
                <div class="text-base font-semibold text-zinc-900">Efficient AI Systems</div>
            </div>

            <!-- Box 4 -->
            <div class="bg-white border border-zinc-200 rounded-xl p-4 hover:border-zinc-400 transition-colors">
                <div class="text-base font-semibold text-zinc-900">Model Optimization</div>
            </div>
        </div>

        <!-- Publications & Preprints -->
        <section class="mt-12">
            <h2 class="text-3xl font-semibold mb-8 border-b pb-4">Selected Publications & Preprints</h2>

            <div id="publications-container" class="space-y-8">
                <!-- Publications will be loaded here dynamically -->
                <div class="text-center py-12 text-zinc-400">
                    Loading publications...
                </div>
            </div>
        </section>
    </main>

    <!-- Footer will be loaded here -->
    <div id="footer"></div>

    <!-- Premium Abstract Modal -->
    <div id="abstractModal"
        class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl flex items-center justify-center z-50 transition-opacity duration-300">
        <!-- <div class="bg-white max-w-2xl w-full mx-4 rounded-3xl shadow-[0_0_80px_-10px_rgb(59,130,246,0.4),0_30px_70px_-20px_rgb(0,0,0,0.25)] 
                overflow-hidden border border-white/60"> -->
        <div class="bg-white max-w-2xl w-full mx-4 rounded-3xl 
            shadow-[0_0_80px_-10px_rgb(59,130,246,0.4),0_30px_70px_-20px_rgb(0,0,0,0.25)]
            hover:shadow-[0_0_135px_15px_rgb(59,130,246,0.65),0_40px_90px_-20px_rgb(0,0,0,0.35)]
            hover:ring-4 hover:ring-blue-400/30
            overflow-hidden
            border border-white/60
            transition-all duration-300 ease-out">

            <!-- Modal Header -->
            <div
                class="px-8 py-6 border-b border-zinc-100 flex items-center justify-between bg-gradient-to-r from-zinc-50 to-white">
                <h2 class="text-2xl font-semibold text-zinc-900 flex items-center gap-3">
                    📝 Abstract
                </h2>
                <button onclick="closeAbstractModal()"
                    class="w-10 h-10 flex items-center justify-center text-3xl text-zinc-400 hover:text-zinc-600 hover:rotate-90 transition-all duration-300">
                    ×
                </button>
            </div>

            <!-- Abstract Content -->
            <div class="p-9 max-h-[68vh] overflow-y-auto text-zinc-700 leading-relaxed text-[15.8px]">
                <p id="abstractText" class="whitespace-pre-line break-words">
                </p>
            </div>

            <!-- Footer -->
            <div class="px-8 py-6 bg-zinc-50 border-t border-zinc-100 flex justify-end">
                <button onclick="closeAbstractModal()"
                    class="px-8 py-3 bg-white border border-zinc-300 text-zinc-700 hover:bg-zinc-900 hover:text-white hover:border-zinc-900 rounded-2xl font-medium transition-all active:scale-95">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        // Load Navbar
        fetch('components/navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;
            })
            .catch(err => console.error('Navbar load error:', err));

        // Load Footer
        fetch('components/footer.html')
            .then(response => response.text())
            .then(data => document.getElementById('footer').innerHTML = data)
            .catch(err => console.error('Footer load error:', err));

        // Load Publications
        const publications = [
            'components/publications/pub-1.html',
            'components/publications/pub-2.html',
            // 'components/publications/pub-3.html'
            // Add more files here as you create them
        ];

        const container = document.getElementById('publications-container');
        container.innerHTML = ''; // Clear loading message

        publications.forEach(file => {
            fetch(file)
                .then(response => response.text())
                .then(html => {
                    container.innerHTML += html;
                })
                .catch(err => console.error('Error loading', file, err));
        });

        // Abstract Modal Functions
        let currentTimeout = null;

        function typeWriter(text, element, speed = 22) {
            element.innerHTML = '';
            element.classList.remove('text-balance');
            element.classList.add('typing'); // show cursor immediately
            let i = 0;

            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    currentTimeout = setTimeout(type, speed);
                } else {
                    // Typing done — wait 2s then fade cursor out
                    setTimeout(() => {
                        element.classList.remove('typing');
                    }, 2000);
                }
            }

            type();
        }

        function showAbstractModal(text) {       // <-- accepts text now
            const modal = document.getElementById('abstractModal');
            const abstractElement = document.getElementById('abstractText');

            modal.classList.remove('hidden');
            modal.style.opacity = '0';

            setTimeout(() => {
                modal.style.transition = 'opacity 300ms ease-out';
                modal.style.opacity = '1';
            }, 10);

            if (currentTimeout) clearTimeout(currentTimeout);
            typeWriter(text, abstractElement, 20);
        }

        function closeAbstractModal() {
            const modal = document.getElementById('abstractModal');
            modal.style.opacity = '0';

            setTimeout(() => {
                modal.classList.add('hidden');
                if (currentTimeout) clearTimeout(currentTimeout);
                const el = document.getElementById('abstractText');
                el.innerHTML = '';
                el.classList.remove('typing'); // clean up cursor class
            }, 300);
        }

        // Close when clicking backdrop
        document.getElementById('abstractModal').addEventListener('click', function (e) {
            if (e.target === this) closeAbstractModal();
        });
    </script>
</body>

</html>
